{% extends 'chamados/base.html' %}
{% block title %}Cadastrar Inquilino{% endblock %}

{% block content %}
<h2>Cadastrar Inquilino</h2>
<div class="card">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Nome completo</label>
                {{ form.nome }}
            </div>
            <div class="form-group">
                <label>CPF (somente números)</label>
                {{ form.cpf }}
            </div>
            <div class="form-group">
                <label>Telefone</label>
                {{ form.telefone }}
            </div>
            <div class="form-group">
                <label>Senha temporária</label>
                {{ form.senha }}
            </div>
            <div class="form-group">
                <label>Imóvel disponível</label>
                {{ form.imovel }}
            </div>
            <button type="submit" class="btn btn-primary">Cadastrar</button>
            <a href="{% url 'listar_inquilinos' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
