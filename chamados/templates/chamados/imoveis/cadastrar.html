{% extends 'chamados/base.html' %}
{% block title %}Cadastrar Imóvel{% endblock %}

{% block content %}
<h2>Cadastrar Imóvel</h2>
<div class="card">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Endereço</label>
                {{ form.endereco }}
            </div>
            <div class="form-group">
                <label>Complemento</label>
                {{ form.complemento }}
            </div>
            <div class="form-group">
                <label>Tipo</label>
                {{ form.tipo }}
            </div>
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a href="{% url 'listar_imoveis' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
