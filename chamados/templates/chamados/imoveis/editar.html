{% extends 'chamados/base.html' %}
{% block title %}Editar Imóvel{% endblock %}

{% block content %}
<h2>Editar Imóvel</h2>
<div class="card">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Endereço</label>
                {{ form.endereco }}
            </div>
            <div class="form-group">
                <label>Complemento</label>
                {{ form.complemento }}
            </div>
            <div class="form-group">
                <label>Inquilino</label>
                {{ form.inquilino }}
            </div>
            <div class="form-group">
                <label>Telefone</label>
                {{ form.telefone }}
            </div>
            <button type="submit" class="btn btn-warning">Salvar Alterações</button>
            <a href="{% url 'listar_imoveis' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
