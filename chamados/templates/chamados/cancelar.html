<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ChaMI - Cancelar Chamado</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Cancelar Chamado #{{ chamado.id }}</h2>

    <div class="alert alert-danger">
        Tem certeza que deseja cancelar este chamado? Esta ação não poderá ser desfeita.
    </div>

    <div class="card mb-3">
        <div class="card-body">
            <p><strong>Imóvel:</strong> {{ chamado.imovel }}</p>
            <p><strong>Categoria:</strong> {{ chamado.get_categoria_display }}</p>
            <p><strong>Descrição:</strong> {{ chamado.descricao }}</p>
        </div>
    </div>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Confirmar Cancelamento</button>
        <a href="{% url 'detalhar_chamado' chamado.pk %}" class="btn btn-secondary">Voltar</a>
    </form>
</div>
</body>
</html>
