{% extends 'chamados/base.html' %}
{% block title %}Editar Administrador{% endblock %}

{% block content %}
<h2>Editar Administrador</h2>
<div class="card">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Nome completo</label>
                {{ form.nome }}
            </div>
            <div class="form-group">
                <label>Nova Senha</label>
                {{ form.nova_senha }}
                <small class="form-text text-muted">Deixe em branco para não alterar.</small>
            </div>
            <button type="submit" class="btn btn-warning">Salvar Alterações</button>
            <a href="{% url 'listar_admins' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
