<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ChaMI - Administradores</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Administradores</h2>
    <a href="{% url 'cadastrar_admin' %}" class="btn btn-primary mb-3">Novo Administrador</a>
    <a href="{% url 'listar_chamados' %}" class="btn btn-secondary mb-3">Voltar</a>

    <table class="table table-bordered">
        <thead class="thead-dark">
            <tr>
                <th>#</th>
                <th>Nome</th>
                <th>CPF</th>
            </tr>
        </thead>
        <tbody>
            {% for admin in admins %}
            <tr>
                <td>{{ admin.id }}</td>
                <td>{{ admin.user.first_name }}</td>
                <td>{{ admin.user.username }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="text-center">Nenhum administrador cadastrado.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
