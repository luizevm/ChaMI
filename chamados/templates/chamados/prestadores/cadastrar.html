<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ChaMI - Cadastrar Prestador</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Cadastrar Prestador de Serviço</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Nome</label>
            {{ form.nome }}
        </div>
        <div class="form-group">
            <label>Área de Atuação</label>
            {{ form.area }}
        </div>
        <div class="form-group">
            <label>Telefone</label>
            {{ form.telefone }}
        </div>
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="{% url 'listar_prestadores' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
