{% extends 'chamados/base.html' %}
{% block title %}Editar Prestador{% endblock %}

{% block content %}
<h2>Editar Prestador</h2>
<div class="card">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Nome</label>
                {{ form.nome }}
            </div>
            <div class="form-group">
                <label>Área de Atuação</label>
                {{ form.area }}
            </div>
            <div class="form-group">
                <label>Telefone</label>
                {{ form.telefone }}
            </div>
            <button type="submit" class="btn btn-warning">Salvar Alterações</button>
            <a href="{% url 'listar_prestadores' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
