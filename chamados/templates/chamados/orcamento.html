<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ChaMI - Enviar Orçamento</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Enviar Orçamento — Chamado #{{ chamado.id }}</h2>

    <div class="card mb-3">
        <div class="card-body">
            <p><strong>Imóvel:</strong> {{ chamado.imovel }}</p>
            <p><strong>Categoria:</strong> {{ chamado.get_categoria_display }}</p>
            <p><strong>Descrição:</strong> {{ chamado.descricao }}</p>
        </div>
    </div>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Valor do Orçamento (R$)</label>
            {{ form.orcamento }}
        </div>
        <div class="form-group">
            <label>Descrição do serviço</label>
            {{ form.observacao }}
        </div>
        <button type="submit" class="btn btn-primary">Enviar Orçamento</button>
        <a href="{% url 'listar_chamados' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
