<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ChaMI - Encerrar Chamado</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Encerrar Chamado #{{ chamado.id }}</h2>

    <div class="alert alert-warning">
        Tem certeza que deseja encerrar este chamado? Esta ação marcará o chamado como <strong>Concluído</strong>.
    </div>

    <div class="card mb-3">
        <div class="card-body">
            <p><strong>Imóvel:</strong> {{ chamado.imovel }}</p>
            <p><strong>Categoria:</strong> {{ chamado.get_categoria_display }}</p>
            <p><strong>Descrição:</strong> {{ chamado.descricao }}</p>
        </div>
    </div>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Observação Final (obrigatória)</label>
            <textarea name="observacao" class="form-control" rows="3" required></textarea>
        </div>
        <button type="submit" class="btn btn-success">Confirmar Encerramento</button>
        <a href="{% url 'detalhar_chamado' chamado.pk %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
